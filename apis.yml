apis:
  - aid: authorize-net:authorize-net-api
    name: Authorize.net API
    description: >-
      The Authorize.net API enables merchants to accept credit cards, debit
      cards, and eChecks through multiple integration methods including
      Accept.js, Accept Hosted, and the AIM/ARB/CIM APIs.
    humanURL: https://developer.authorize.net/
