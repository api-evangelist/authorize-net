generated: '2026-07-14'
method: searched
source: https://developer.authorize.net/api/changes.html
description: >-
  Structured capture of Authorize.Net's API change log. Unlike modern
  gateways, Authorize.Net does not cut dated API versions or release trains — the
  gateway API is effectively unversioned and changes are backwards-compatible and
  additive. The Developer Center maintains an "API change log" (developer-facing,
  additive changes and deprecations) and a "System change log" (endpoint/cert
  changes); a separate merchant-facing "Release Notes" stream covers the Merchant
  Interface (2.0) UI, not the API. This artifact records the API change log
  window; the live change log is the source of truth.
docs:
  - https://developer.authorize.net/api/changes.html
  - https://developer.authorize.net/api/system_changes.html
  - https://support.authorize.net/ (merchant-facing release notes)
versioning:
  scheme: unversioned / additive
  header: none
  path_version: v1 (/xml/v1/request.api)
  detail: >-
    No version request header, no dated versions. New fields and request types
    are added without breaking existing integrations.
  conventions: conventions/authorize-net-conventions.yml
entries:
  - date: '2019-09-03'
    type: addition
    highlights:
      - Added support for the Card-on-File Mandate (stored-credential framework) across the API.
  - date: '2019-06-27'
    type: deprecation
    highlights:
      - In production, the transHash element stopped returning a value; integrations must migrate to transHashSHA2 (HMAC-SHA512) for response verification.
  - date: '2019-03-03'
    type: deprecation
    highlights:
      - transHash deprecation applied to the sandbox environment ahead of production; use transHashSHA2.
  - date: '2018-09-20'
    type: addition
    highlights:
      - 'Accept Hosted: past dates shown in red on the expiry field, added company-name billing field, Title-Case labels, new Mastercard 2-series support, mandatory eCheck.Net account field.'
      - 'Accept Customer: legacy Hosted CIM migration, removed fax field, payment options disabled until required fields are complete.'
      - 'Accept.js: fixed pop-up scroll position and expiry field, new Mastercard 2-series support.'
  - date: '2017-11-02'
    type: addition
    highlights:
      - Introduced a mobile-optimized hosted payment form option for the Accept JavaScript library.
  - date: '2017-10-17'
    type: addition
    highlights:
      - ARBGetSubscriptionRequest now returns the list of transactions generated by a subscription.
  - date: '2017-07-28'
    type: addition
    highlights:
      - Added Account Updater Job Summary and Account Updater Job Details reporting operations.
  - date: '2017-07-07'
    type: addition
    highlights:
      - getCustomerProfile and getCustomerPaymentProfile accept includeIssuerInfo to return the Issuer Identification Number (IIN/BIN).
system_changes:
  - date: '2020-03-11'
    highlights:
      - Security certificate renewed for the API endpoints at api.authorize.net and apitest.authorize.net.
note: >-
  The developer API change log is updated infrequently because the API is
  additive and stable; active product change communication happens in the
  Merchant Interface Release Notes (support.authorize.net), which covers the
  2.0 New Merchant Experience UI rather than the gateway API.
